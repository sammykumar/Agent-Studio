version: "3"

# Repo-local ngrok config. Auth token is NOT stored here — set NGROK_AUTHTOKEN
# in your shell (e.g. ~/.zshrc) and ngrok will pick it up automatically:
#
#   export NGROK_AUTHTOKEN=<your-token>
#
# Or run once globally:  ngrok config add-authtoken <your-token>
# (in which case start with both configs:
#   ngrok start agent-studio --config "$HOME/Library/Application Support/ngrok/ngrok.yml" --config ./ngrok.yml)
#
# Free tier: no `domain:` field — ngrok assigns a fresh URL each run and prints
# it in the startup banner. Upgrade to a paid plan or claim a reserved static
# domain at https://dashboard.ngrok.com/domains, then add:
#   domain: <your-assigned>.ngrok-free.app

tunnels:
  agent-studio:
    proto: http
    addr: 3100
