services:
  agent-studio:
    container_name: agent-studio
    build:
      context: .
      dockerfile: Dockerfile
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    ports:
      - "32123:32123"
    environment:
      AGENT_STUDIO_HOST: 0.0.0.0
    volumes:
      - ./data/config:/home/agent-studio/.config
      - ./data/local:/home/agent-studio/.local
      - ./data/gitconfig:/home/agent-studio/.gitconfig
      - ./data/ssh:/home/agent-studio/.ssh
      - ./data/codex:/home/agent-studio/.codex
      - ./data/agent-studio:/home/agent-studio/.agent-studio
      - ./workspaces:/home/agent-studio/workspaces
    restart: unless-stopped
